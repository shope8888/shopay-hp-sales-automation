name: Daily Google Maps Scraping
name: Daily Google Maps Scraping

on:
  schedule:
      - cron: '0 8 * * *'
        workflow_dispatch:
        
        jobs:
          scrape:
              runs-on: ubuntu-latest
                  timeout-minutes: 30
                  
                      steps:
                            - uses: actions/checkout@v4
                            
                                  - uses: actions/setup-python@v4
                                          with:
                                                    python-version: '3.11'
                                                    
                                                          - name: Install dependencies
                                                                  run: |
                                                                            python3 -m pip install --upgrade pip
                                                                                      pip install selenium webdriver-manager requests
                                                                                      
                                                                                            - name: Run Google Maps Scraper
                                                                                                    run: |
                                                                                                              cd $GITHUB_WORKSPACE
                                                                                                                        python3 scripts/google_maps_scraper.py
                                                                                                                        
                                                                                                                              - name: Check if CSV file exists
                                                                                                                                      run: |
                                                                                                                                                if [ -f target_companies_opening_soon_no_website.csv ]; then
                                                                                                                                                            echo "✅ CSV file generated successfully"
                                                                                                                                                                        echo "File size: $(wc -c < target_companies_opening_soon_no_website.csv) bytes"
                                                                                                                                                                                    head -3 target_companies_opening_soon_no_website.csv
                                                                                                                                                                                              else
                                                                                                                                                                                                          echo "⚠️ CSV file not found"
                                                                                                                                                                                                                      ls -la target_companies_* || echo "No target_companies files"
                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                
                                                                                                                                                                                                                                      - name: Commit and push if changed
                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                        git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                  git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                            git add target_companies_opening_soon_no_website.csv || true
                                                                                                                                                                                                                                                                                      git commit -m "Daily scraping - $(date +%Y-%m-%d_%H:%M:%S)" || echo "No changes"
                                                                                                                                                                                                                                                                                                git push || echo "Push failed"on:
  schedule:
      - cron: '0 8 * * *'
        workflow_dispatch:
        jobs:
          scrape:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v4
