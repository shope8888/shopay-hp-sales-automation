name: Daily Google Maps Scraping & SNS Verification

on:
  schedule:
      - cron: '0 8 * * *'
        workflow_dispatch:

        jobs:
          scrape-and-verify:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v4
                              - uses: actions/setup-python@v4
                                      with:
                                                python-version: '3.11'
                                                      - run: |
                                                                python -m pip install --upgrade pip
                                                                          pip install selenium webdriver-manager requests
                                                                                - run: python3 scripts/1_google_maps_scraper.py
                                                                                      - run: |
                                                                                                if [ -f data/google_maps_scraped_companies.csv ]; then
                                                                                                            python3 scripts/3_verify_sns_accounts.py data/google_maps_scraped_companies.csv
                                                                                                                      fi
                                                                                                                            - run: |
                                                                                                                                      git config --local user.email "action@github.com"
                                                                                                                                                git config --local user.name "GitHub Action"
                                                                                                                                                          git add -A
                                                                                                                                                                    git diff --quiet && git diff --staged --quiet || git commit -m "Daily scraping results - $(date '+%Y-%m-%d')"
                                                                                                                                                                          - uses: ad-m/github-push-action@master
                                                                                                                                                                                  with:
                                                                                                                                                                                            github_token: ${{ secrets.GITHUB_TOKEN }}
