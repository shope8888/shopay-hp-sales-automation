name: Daily Google Maps Scraping
on:
  schedule:
      - cron: '0 8 * * *'
        workflow_dispatch:
        jobs:
          scrape:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v4
                              - uses: actions/setup-python@v4
                                      with:
                                                python-version: '3.11'
                                                      - run: pip install -U pip selenium webdriver-manager requests
                                                            - run: python3 scripts/1_google_maps_scraper_CORRECTED.py
