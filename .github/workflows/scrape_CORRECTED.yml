name: Daily Google Maps Scraping - Opening Soon, No Website

on:
  schedule:
      - cron: '0 8 * * *'
        workflow_dispatch:
        
        jobs:
          scrape-target-companies:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v4
                              
                                    - uses: actions/setup-python@v4
                                            with:
                                                      python-version: '3.11'
                                                            
                                                                  - name: Install dependencies
                                                                          run: |
                                                                                    python -m pip install --upgrade pip
                                                                                              pip install selenium webdriver-manager requests
                                                                                                    
                                                                                                          - name: Run Google Maps Scraper
                                                                                                                  run: |
                                                                                                                            python3 scripts/1_google_maps_scraper_CORRECTED.py
                                                                                                                                  
                                                                                                                                        - name: Commit and push results
                                                                                                                                                run: |
                                                                                                                                                          git config --local user.email "action@github.com"
                                                                                                                                                                    git config --local user.name "GitHub Action Bot"
                                                                                                                                                                              git add -A
                                                                                                                                                                                        git diff --quiet && git diff --staged --quiet || git commit -m "Daily scraping: $(date '+%Y-%m-%d')"
                                                                                                                                                                                              
                                                                                                                                                                                                    - name: Push changes
                                                                                                                                                                                                            uses: ad-m/github-push-action@master
                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                              github_token: ${{ secrets.GITHUB_TOKEN }}name: Daily Google Maps Scraping - Opening Soon, No Website

